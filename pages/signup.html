<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký — Znews</title>
  <link rel="stylesheet" href="../assets/css/auth.css" />
</head>
<body>

<div class="auth-page">

  <!-- Top bar -->
  <header class="topbar">
    <a href="../pages/index.html" class="topbar-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M4 4h16v3L8 17h12v3H4v-3l12-10H4z"/></svg>
      </div>
      <span class="logo-text">Znews</span>
    </a>
    <a href="../pages/index.html" class="topbar-link">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
      Về trang chủ
    </a>
  </header>

  <!-- Card -->
  <main class="auth-card">

    <div class="auth-header">
      <p class="auth-eyebrow">Tạo tài khoản</p>
      <h1 class="auth-title">Đăng ký</h1>
      <p class="auth-subtitle">Hoàn toàn miễn phí. Đọc tin không giới hạn.</p>
    </div>

    <div class="auth-form">

      <!-- Email -->
      <div class="field" id="field-email">
        <label class="field-label" for="email">Email</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M2 7l10 7 10-7"/>
          </svg>
          <input
            class="auth-input"
            type="email"
            id="email"
            placeholder="ten@example.com"
            autocomplete="email"
          />
        </div>
        <span class="field-error" id="email-error"></span>
      </div>

      <!-- Password -->
      <div class="field" id="field-password">
        <label class="field-label" for="password">Mật khẩu</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            class="auth-input has-toggle"
            type="password"
            id="password"
            placeholder="Tối thiểu 6 ký tự"
            autocomplete="new-password"
          />
          <button class="toggle-pass" type="button" id="toggle-pass" aria-label="Hiện mật khẩu">
            <svg id="eye-icon" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- Thanh độ mạnh mật khẩu -->
        <div class="strength-bar" id="strength-bar">
          <div class="strength-seg" id="seg1"></div>
          <div class="strength-seg" id="seg2"></div>
          <div class="strength-seg" id="seg3"></div>
        </div>
        <span class="strength-label" id="strength-label"></span>
        <span class="field-error" id="pass-error"></span>
      </div>

      <!-- Confirm Password -->
      <div class="field" id="field-cfpassword">
        <label class="field-label" for="cf-password">Xác nhận mật khẩu</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24">
            <path d="M9 12l2 2 4-4"/>
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            class="auth-input has-toggle"
            type="password"
            id="cf-password"
            placeholder="Nhập lại mật khẩu"
            autocomplete="new-password"
          />
          <button class="toggle-pass" type="button" id="toggle-cf-pass" aria-label="Hiện mật khẩu">
            <svg id="eye-icon-cf" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="cf-pass-error"></span>
      </div>

      <!-- Submit -->
      <button class="btn-submit" type="button" id="register-btn">
        <span class="btn-text">Tạo tài khoản</span>
        <div class="spinner"></div>
      </button>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">hoặc tiếp tục với</span>
        <div class="divider-line"></div>
      </div>

      <!-- Social -->
            <div class="social-row">
        <a href="#" class="btn-social btn-social-google" data-provider="google">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Tiếp tục với Google
        </a>
      </div>

    </div><!-- /auth-form -->

    <p class="auth-footer">
      Đã có tài khoản?
      <a href="../pages/login.html">Đăng nhập</a>
    </p>

  </main><!-- /auth-card -->

  <!-- Bottom bar -->
  <footer class="bottombar">
    <a href="#">Điều khoản</a>
    <a href="#">Chính sách</a>
    <a href="#">Hỗ trợ</a>
    <span>© 2025 Znews</span>
  </footer>

</div><!-- /auth-page -->

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<script type="module" src="../assets/java/databaseconfig.js"></script>
<script type="module" src="../assets/java/signup.js"></script>

</body>
</html>
